name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into script
        run: sed -i "s/VERSION=\"dev\"/VERSION=\"${{ steps.version.outputs.version }}\"/" bin/mise-volta-compat

      - name: Create platform tarballs
        run: |
          chmod +x bin/mise-volta-compat
          platforms=("linux-x64" "linux-arm64" "macos-x64" "macos-arm64")
          for platform in "${platforms[@]}"; do
            tar -czf "mise-volta-compat-${GITHUB_REF_NAME}-${platform}.tar.gz" -C bin mise-volta-compat
          done

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            mise-volta-compat-${GITHUB_REF_NAME}-*.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
